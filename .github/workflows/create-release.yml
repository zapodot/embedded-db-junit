name: Create release
on:
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create new release version
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
        with:
          persist-credentials: false
      - name: Create release tag
        uses: hennejg/github-tag-action@2cd21a8413aa58e36a69cb22e64d5ad20aeb9b99 # ratchet:hennejg/github-tag-action@v4.3.1
        id: git-tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          release_branches: 'master'
          tag_prefix: ''
      - name: Dump tag settings
        shell: bash
        run: |
          echo "## Release info " >> $GITHUB_STEP_SUMMARY
          echo "- new tag: ${{ steps.git-tag.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- previous tag: ${{ steps.git-tag.outputs.previous_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- new version: ${{ steps.git-tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- changelog: ${{ steps.git-tag.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY
      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # ratchet:actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          cache: maven
      - name: Set version
        shell: bash
        env:
          NEW_VERSION: ${{ steps.git-tag.outputs.new_version }}
        run: mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false


